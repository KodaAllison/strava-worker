# ─────────────────────────────────────────────────────────────────────────────
# wrangler.toml — the Worker's deployment config (Cloudflare's equivalent of the
# stuff Vercel inferred for you automatically). Nothing here is magic; every line
# tells Cloudflare one fact about how to run this Worker.
# ─────────────────────────────────────────────────────────────────────────────

name = "strava-data"            # the Worker's name → strava-data.<you>.workers.dev
main = "src/index.js"           # the entry file the runtime loads
compatibility_date = "2026-05-01"  # pins Worker runtime behavior to a known date

# ── Cron Trigger ─────────────────────────────────────────────────────────────
# Cloudflare's built-in scheduler. When a trigger fires, the runtime calls the
# `scheduled()` handler in src/index.js (NOT `fetch()`), passing `event.cron` =
# the exact string below, so the handler can tell which schedule fired.
#
# TWO cadences, because the two datasets change at very different rates:
#   • "15 */3 * * *"  — every 3 hours (at :15). Refreshes LIVE STATS only
#     (recent_activity, weekly_km, …). Cheap: ~4 Strava calls. The :15 offset
#     keeps it from colliding with the weekly run at :00.
#   • "0 6 * * SUN"   — Sunday 06:00 UTC. The FULL run: live stats PLUS the
#     personal-best walk (subrequest-heavy detail fetches). See WEEKLY_CRON in
#     src/index.js — that string is what flips on PR computation.
#
# NOTE: Cloudflare's cron is NOT standard crontab. Its day-of-week field is 1-7
# where 1 = Sunday and 7 = Saturday — there is no `0`. Standard `0 6 * * 0` is
# rejected with "invalid cron string [code: 10100]". Use SUN (or 1) for Sunday.
[triggers]
crons = ["15 */3 * * *", "0 6 * * SUN"]

# ── KV namespace binding ─────────────────────────────────────────────────────
# KV is Cloudflare's edge key-value store. `binding` is the variable name your
# code sees as `env.STRAVA_KV`. The `id` points at the real namespace — you
# create it once with:
#     npx wrangler kv namespace create STRAVA_KV
# then paste the printed id below. (Local `wrangler dev` simulates KV, so you can
# run the dev server before doing this — it just won't persist to the cloud.)
[[kv_namespaces]]
binding = "STRAVA_KV"
id = "e7fa114265bd48e08a2282ffa978dbaf"